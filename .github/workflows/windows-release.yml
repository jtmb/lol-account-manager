name: Windows Release

on:
  push:
    branches:
      - main
    paths:
      - app_config.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Resolve app version
        id: version
        shell: pwsh
        run: |
          $configPath = Join-Path $PWD "app_config.json"
          if (-not (Test-Path $configPath)) {
            throw "app_config.json not found"
          }

          $config = Get-Content -Raw -Path $configPath | ConvertFrom-Json
          $version = "$($config.app_version)".Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "app_version is missing in app_config.json"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$version" >> $env:GITHUB_OUTPUT

      - name: Build executable
        shell: pwsh
        run: |
          python build_exe.py

      - name: Create zip artifact
        shell: pwsh
        run: |
          $zipPath = Join-Path $PWD "LoLAccountManager.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          $distRoot = Join-Path $PWD "dist"
          if (-not (Test-Path $distRoot)) {
            throw "dist folder not found"
          }

          $folderCandidates = @(
            (Join-Path $distRoot "LoLAccountManager"),
            (Join-Path $distRoot "LoL Account Manager")
          )

          $sourcePath = $null
          foreach ($candidate in $folderCandidates) {
            if (Test-Path $candidate) {
              $sourcePath = Join-Path $candidate "*"
              break
            }
          }

          if ($null -eq $sourcePath) {
            $exeCandidates = @(
              (Join-Path $distRoot "LoLAccountManager.exe"),
              (Join-Path $distRoot "LoL Account Manager.exe")
            )
            foreach ($exe in $exeCandidates) {
              if (Test-Path $exe) {
                $sourcePath = $exe
                break
              }
            }
          }

          if ($null -eq $sourcePath) {
            Get-ChildItem $distRoot -ErrorAction SilentlyContinue | Format-Table -AutoSize
            throw "No supported build output found under dist"
          }

          Compress-Archive -Path $sourcePath -DestinationPath $zipPath -Force

      - name: Ensure release tag exists
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $tagExists = $false
          git rev-parse "refs/tags/$tag" *> $null
          if ($LASTEXITCODE -eq 0) {
            $tagExists = $true
          }

          $headCommit = (git rev-parse HEAD).Trim()
          if ($tagExists) {
            $tagCommit = (git rev-list -n 1 $tag).Trim()
            if ($tagCommit -ne $headCommit) {
              Write-Host "Tag '$tag' exists on $tagCommit; moving it to $headCommit for this release."
              git tag -d $tag | Out-Null
              git push origin ":refs/tags/$tag"
            }
          }

          git tag -a $tag -m "Release $tag" $headCommit
          git push origin $tag --force

      - name: Generate release notes
        id: notes
        shell: pwsh
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          $currentTag = $env:TAG
          $repo = $env:REPO

          $allTags = @(git tag --sort=-creatordate)
          $prevTag = ""
          foreach ($t in $allTags) {
            if (-not [string]::IsNullOrWhiteSpace($t) -and $t -ne $currentTag) {
              $prevTag = $t
              break
            }
          }

          $subjects = @()
          if ([string]::IsNullOrWhiteSpace($prevTag)) {
            $subjects = @(git log -n 25 --pretty=format:"%s")
          }
          else {
            $subjects = @(git log "$prevTag..HEAD" --pretty=format:"%s")
          }

          $subjects = $subjects |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Where-Object { $_ -notmatch "^(merge|Merge)\b" }

          $featureLines = @()
          if ($subjects.Count -eq 0) {
            $featureLines += "- No new commits detected since the previous release tag."
          }
          else {
            foreach ($s in $subjects) {
              $featureLines += "- $s"
            }
          }

          $downloadUrl = "https://github.com/$repo/releases/download/$currentTag/LoLAccountManager.zip"
          $bugUrl = "https://github.com/$repo/issues/new?assignees=&labels=bug&title=bug%3A+"
          $featureUrl = "https://github.com/$repo/issues/new?assignees=&labels=enhancement&title=feat%3A+"
          $repoUrl = "https://github.com/$repo"
          $logoUrl = "https://github.com/jtmb/lol-account-manager/blob/main/assets/icon.ico"

          $bodyLines = @(
            '<h1 align="center">',
            "	<a href=""$repoUrl"">",
            "		<img src=""$logoUrl"" alt=""LoL Account Manager Logo"" width=""220"" height=""auto"">",
            '	</a>',
            '</h1>',
            '',
            '<div align="center">',
            '	<b>League of Legends Account Manager</b> - Securely manage, organize, and launch multiple LoL accounts from one desktop app.',
            '	<br />',
            '	<br />',
            "	<a href=""$downloadUrl"">Download</a>",
            '	·',
            "	<a href=""$bugUrl"">Report a Bug</a>",
            '	·',
            "	<a href=""$featureUrl"">Request a Feature</a>",
            '</div>',
            '',
            '<br>',
            '',
            'New features for this release include:',
            '',
            ($featureLines -join "`n"),
            '',
            '-------------------------',
            '',
            '',
            '**Install Instructions**',
            '',
            "1. Download [LoLAccountManager.zip]($downloadUrl)",
            '',
            '2. Extract the contents of the ZIP file.',
            '',
            '3. Run LoLAccountManager.exe',
            '',
            '4. You may see Windows SmartScreen warnings because the application is not yet digitally signed. These warnings are expected and can be safely ignored.'
          )
          $body = $bodyLines -join "`n"

          $notesPath = Join-Path $PWD "release-notes.generated.md"
          Set-Content -Path $notesPath -Value $body -Encoding UTF8

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: LoL Account Manager ${{ steps.version.outputs.version }}
          bodyFile: release-notes.generated.md
          artifacts: LoLAccountManager.zip
          artifactContentType: application/zip
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
